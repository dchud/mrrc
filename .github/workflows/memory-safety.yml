name: Memory Safety Checks (ASAN)

# Run nightly to detect memory safety regressions without blocking regular CI
on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger for on-demand testing
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  asan-library-tests:
    name: ASAN Memory Safety Tests
    runs-on: ubuntu-latest
    strategy:
      # Let all ASAN tests run even if one fails, for comprehensive feedback
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust nightly toolchain with ASAN support
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-asan-${{ hashFiles('**/Cargo.lock') }}

      - name: Run ASAN on library and integration tests
        env:
          # Override rust-toolchain.toml pin so -Zbuild-std uses the nightly
          # toolchain installed above rather than the stable channel.
          RUSTUP_TOOLCHAIN: nightly
        run: |
          export RUSTFLAGS="-Z sanitizer=address"
          export LSAN_OPTIONS="suppressions=${{ github.workspace }}/.cargo/asan_suppressions.txt"
          # Use -Zbuild-std to rebuild std with ASAN and properly handle proc-macros
          # Proc-macros run on host at compile time, so they need special handling
          cargo test --lib --tests --package mrrc -q -Zbuild-std --target x86_64-unknown-linux-gnu

      - name: Report results
        if: always()
        run: echo "ASAN tests completed. Check output above for any issues."

  notify-failure:
    name: File failure issue
    needs: asan-library-tests
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: File or update the failure-tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "Nightly ASAN run failed"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --json number,title \
            --jq '[.[] | select(.title == env.TITLE)][0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Failed again: $RUN_URL"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" \
              --body "Scheduled run failed: $RUN_URL. Later failures will be added here as comments."
          fi
