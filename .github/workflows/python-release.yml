name: Python Release to PyPI

on:
  push:
    tags:
      - 'v*'
  # Dry run: builds and tests every artifact (wheels, sdist) without
  # publishing — the publish/release steps are gated on tag refs.
  workflow_dispatch:

jobs:
  build-release-wheels:
    name: Build release wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: PyO3/maturin-action@v1
        with:
          manylinux: auto
          # macOS builds universal2 (arm64 + x86_64 in one wheel) so Intel
          # Macs are covered; GitHub no longer offers Intel macOS runners,
          # and the arm64 slice still gets natively import-tested by the
          # test-release-wheels job.
          target: ${{ matrix.os == 'macos-latest' && 'universal2-apple-darwin' || '' }}
          args: --release --out dist -i python${{ matrix.python-version }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: release-wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist

  build-cross-linux-wheels:
    name: Build cross-compiled ${{ matrix.target }} wheel (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-unknown-linux-gnu, i686-unknown-linux-gnu]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist -i python${{ matrix.python-version }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: release-wheels-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: release-sdist
          path: dist

  test-sdist:
    name: Test install from sdist
    needs: build-sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v8
        with:
          name: release-sdist
          path: dist

      - name: Build from sdist and smoke-test
        run: |
          # Compiles the extension from source — proves the sdist is the
          # working fallback for platforms outside the wheel matrix.
          pip install dist/mrrc-*.tar.gz
          python -c "
          import mrrc
          records = list(mrrc.MARCReader(open('tests/data/simple_book.mrc','rb').read()))
          assert len(records) == 1 and records[0].title == 'The Great Gatsby'
          print('sdist install OK')
          "

  validate-cross-wheels:
    name: Validate ${{ matrix.target }} wheel (Python ${{ matrix.python-version }})
    needs: build-cross-linux-wheels
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-unknown-linux-gnu, i686-unknown-linux-gnu]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-wheels-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

      - name: Validate wheel exists with correct platform tag
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            EXPECTED_TAG="aarch64"
          elif [ "${{ matrix.target }}" = "i686-unknown-linux-gnu" ]; then
            EXPECTED_TAG="i686"
          fi
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -z "$WHEEL" ]; then
            echo "ERROR: No .whl file found in dist/"
            ls -la dist/
            exit 1
          fi
          echo "Found wheel: $WHEEL"
          if echo "$WHEEL" | grep -q "$EXPECTED_TAG"; then
            echo "OK: Wheel filename contains expected tag '$EXPECTED_TAG'"
          else
            echo "ERROR: Wheel filename does not contain expected tag '$EXPECTED_TAG'"
            exit 1
          fi

  test-release-wheels:
    name: Test release wheels on ${{ matrix.os }}
    needs: build-release-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - uses: actions/download-artifact@v8
        with:
          name: release-wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          # Install the wheel together with the [dev] extra (which extends
          # [test] via self-reference) so test runtime deps + type checkers
          # stay in sync with pyproject.toml as a single source of truth.
          WHEEL=$(ls dist/mrrc-*.whl | head -1)
          uv pip install --system "${WHEEL}[dev]"

      - name: Run pytest (core tests, excludes benchmarks)
        run: |
          pytest tests/python/ -m "not benchmark" -v
        # Retry on macOS due to intermittent runner flakiness
        if: runner.os != 'macOS'

      - name: Run pytest with retry (macOS)
        if: runner.os == 'macOS'
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts"
            if pytest tests/python/ -m "not benchmark" -v; then
              echo "Tests passed on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying..."
            attempt=$((attempt + 1))
            sleep 5
          done
          echo "All $max_attempts attempts failed"
          exit 1
        shell: bash

      - name: Run type checking
        run: |
          mypy tests/python/ --strict || true
          pyright tests/python/ || true

  publish-pypi:
    name: Publish to PyPI
    needs: [test-release-wheels, validate-cross-wheels, test-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v8
        with:
          # Collects release-wheels-* and release-sdist.
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version (between its header and the next ## header)
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to avoid shell quoting issues
          echo "$NOTES" > release_notes.md

      - name: Publish to PyPI
        # Skipped on workflow_dispatch dry runs; only tag pushes publish.
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: List artifacts (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "Dry run — artifacts that a tag push would publish:"
          ls -l dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
