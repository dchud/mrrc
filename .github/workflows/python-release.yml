name: Python Release to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release-wheels:
    name: Build release wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc
      
      - uses: PyO3/maturin-action@v1
        with:
          python-version: ${{ matrix.python-version }}
          manylinux: off
          args: --release --out dist
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels
          path: dist

  test-release-wheels:
    name: Test release wheels on ${{ matrix.os }}
    needs: build-release-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist
      
      - name: Install wheel
        run: |
          pip install --upgrade pip
          pip install dist/mrrc-*.whl
      
      - name: Install test dependencies
        run: |
          pip install pytest pytest-benchmark mypy pyright
      
      - name: Run pytest
        run: |
          pytest tests/python/ -v
      
      - name: Run type checking
        run: |
          mypy tests/python/ --strict || true
          pyright tests/python/ || true

  publish-pypi:
    name: Publish to PyPI
    needs: test-release-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
