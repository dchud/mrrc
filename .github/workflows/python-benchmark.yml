name: Python Benchmarks (pytest-benchmark)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    name: Python Benchmark Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build mrrc wheel
        uses: PyO3/maturin-action@v1
        with:
          python-version: ${{ matrix.python-version }}
          manylinux: auto
          args: --release
      
      - name: Install mrrc and dependencies
        run: |
          pip install --no-index --find-links dist mrrc
          pip install pytest pytest-benchmark pymarc
      
      - name: Run pytest benchmarks (1k/10k only, skip slow)
        run: |
          pytest tests/python/ -v --benchmark-only -m "not slow"
      
      - name: Run comparison benchmarks
        run: |
          python scripts/benchmark_comparison.py
      
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results-py${{ matrix.python-version }}
          path: |
            .benchmarks/
            tests/python/.benchmarks/

  codspeed:
    name: Codspeed Performance Regression Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build mrrc wheel
        uses: PyO3/maturin-action@v1
        with:
          python-version: "3.12"
          manylinux: auto
          args: --release
      
      - name: Install mrrc and dependencies
        run: |
          pip install --no-index --find-links dist mrrc
          pip install pytest pytest-benchmark codspeed
      
      - name: Run benchmarks with Codspeed (1k/10k only)
        uses: CodSpeedHQ/action@v1
        with:
          # NOTE: Only enabled if CODSPEED_TOKEN is set as a repo secret
          token: ${{ secrets.CODSPEED_TOKEN }}
          fail-on-failure: false
          run: pytest tests/python/ --benchmark-only -m "not slow" -v
