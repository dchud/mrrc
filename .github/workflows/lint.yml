name: Lint and Format

on:
  # No paths-ignore here: these jobs are required status checks on the main
  # ruleset. A workflow skipped by a path filter never reports its check, which
  # leaves the required check pending forever and makes the PR unmergeable.
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run clippy (mrrc core)
        run: cargo clippy --package mrrc --all-targets -- -D warnings

      - name: Run clippy (mrrc-python)
        run: cargo clippy --package mrrc-python --all-targets -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check documentation
        run: cargo doc --all --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  ruff:
    name: Ruff (Python lint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Check formatting
        run: uvx ruff format --check mrrc/ tests/python/

      - name: Run ruff
        run: uvx ruff check mrrc/ tests/python/

  stubtest:
    name: Stubtest (.pyi vs compiled extension)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Build extension
        run: uv run maturin develop

      - name: Run stubtest
        run: uv run python -m mypy.stubtest mrrc._mrrc

  typecheck:
    name: Type check (mypy + pyright on mrrc/)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Build extension
        run: uv run maturin develop

      # Same commands as check.sh: both checkers gate the wrapper package
      # in CI exactly as they do locally.
      - name: Run mypy on mrrc/
        run: uv run mypy mrrc/

      - name: Run pyright on mrrc/
        run: uv run pyright mrrc/

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Single source: the declared rust-version is read from Cargo.toml so
      # the declaration and this check cannot drift apart.
      - name: Read declared MSRV
        id: msrv
        run: |
          msrv=$(sed -n 's/^rust-version = "\(.*\)"$/\1/p' Cargo.toml)
          test -n "$msrv" || { echo "no rust-version in Cargo.toml" >&2; exit 1; }
          echo "msrv=$msrv" >> "$GITHUB_OUTPUT"

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # RUSTUP_TOOLCHAIN overrides the rust-toolchain.toml pin, which would
      # otherwise route cargo back to the pinned (newer) toolchain.
      - name: cargo check on declared MSRV
        run: cargo check --workspace
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.msrv }}

  zizmor:
    name: Workflow security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      # Audits every workflow for supply-chain issues (unpinned actions,
      # credential persistence, excessive permissions, cache poisoning).
      # Policy exceptions live in .github/zizmor.yml. Offline audits only, so
      # the gate fails on our own workflow changes, not on upstream advisory
      # churn.
      - name: Run zizmor
        run: uvx zizmor@1.26.1 --offline .github/workflows/
