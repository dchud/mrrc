name: CHANGELOG

# Runs only when the changelog or its lint script changes. A dedicated trigger
# (rather than a job in lint.yml) is required because lint.yml ignores `**.md`,
# so a CHANGELOG-only change would otherwise never be linted.
on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'
      - 'scripts/lint-changelog.sh'
  pull_request:
    branches: [main]
    paths:
      - 'CHANGELOG.md'
      - 'scripts/lint-changelog.sh'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    name: CHANGELOG lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint CHANGELOG [Unreleased] block
        run: bash scripts/lint-changelog.sh
