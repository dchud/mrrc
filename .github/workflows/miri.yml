name: Miri

# Miri is a non-gating canary, not a PR check. The mrrc core crate (the
# `--lib` target below) is entirely safe Rust — it has no first-party
# `unsafe`, so Miri's only job here is to catch undefined behaviour in how
# the crate drives its unsafe *dependencies* (smallvec's `union` storage,
# memchr in the parser) and in any first-party `unsafe` added to the core
# later. The genuine first-party `unsafe` lives in the PyO3 bindings
# (src-python/), which Miri cannot run at all (it can't execute the CPython
# FFI). Given that narrow, slow-moving value, a full-suite run every night
# is wasteful, so this runs weekly. Run it on demand (workflow_dispatch)
# after touching `unsafe` or bumping an unsafe-bearing dependency.
on:
  schedule:
    - cron: '0 6 * * 1'  # weekly, Mondays at 6am UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  miri:
    name: Miri
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Miri on unit tests
        run: cargo +nightly miri test --lib
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
          # Prevent insta from spawning `cargo metadata` to discover the
          # workspace root — Miri can't execute subprocesses (no pidfd_spawnp).
          INSTA_WORKSPACE_ROOT: ${{ github.workspace }}

  notify-failure:
    name: File failure issue
    needs: miri
    if: (failure() || cancelled()) && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: File or update the failure-tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "Nightly Miri run failed"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --json number,title \
            --jq '[.[] | select(.title == env.TITLE)][0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Failed again: $RUN_URL"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" \
              --body "Scheduled run failed: $RUN_URL. Later failures will be added here as comments."
          fi
