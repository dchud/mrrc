[package]
name = "mrrc"
version = "0.1.0"
edition = "2021"
authors = ["MARC Rust Community"]
description = "A Rust library for working with MARC bibliographic data"
license = "MIT"
repository = "https://github.com/mrrc/mrrc"
rust-version = "1.71"

[dependencies]
# Core parsing and data handling
bytes = "1.5"
nom = "7.1"
lazy_static = "1.4"

# Encoding support
encoding_rs = "0.8"
unicode-normalization = "0.1"

# Serialization formats
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
quick-xml = { version = "0.31", features = ["serialize"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Testing and examples
#proptest = "1.0"

# Examples and utilities
csv = "1.3"
flate2 = "1.0"

[dev-dependencies]
proptest = "1.0"
